<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THR Lebaran</title>

<!-- Bootstrap 4 -->
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
    font-family: 'Poppins', sans-serif;
    height:100vh;
    margin:0;
    min-height:100vh;   /* ✅ ganti height */
    position:relative;
    overflow-x:hidden;  /* ✅ hanya sembunyikan horizontal */
}

.main-wrapper{
    min-height:100vh;
    display:flex;
    flex-direction:column;   /* 🔥 Ini yang penting */
    align-items:center;
    justify-content:center;
    padding:20px;
    gap:20px;               /* Jarak antar card */
    position:relative;
    z-index:1;
}

@media (max-width:576px){

    .card-thr,
    .card-transfer{
        padding:25px 20px;
        max-width:100%;
    }

    .result{
        font-size:24px;
    }

    .payment-box{
        grid-template-columns: 1fr;
    }

}

body::before{
    content:'';
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:url('img/4.jpg') no-repeat center center;
    background-size:cover;
    animation: floatBg 25s ease-in-out infinite alternate;
    z-index:-1;
}

@keyframes floatBg{
    0%{
        transform: scale(1) translateY(0px);
    }
    100%{
        transform: scale(1.1) translateY(-30px);
    }
}

.card-thr{
    border:none;
    border-radius:20px;
    padding:40px 30px;
    text-align:center;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
    background:white;
    max-width:450px;
    width:100%;
    position:relative;
    overflow:hidden;
}

.title{
    font-weight:700;
    font-size:24px;
    margin-bottom:10px;
}

.subtitle{
    font-size:14px;
    color:#777;
    margin-bottom:25px;
}

input{
    border-radius:30px !important;
    padding:12px 20px !important;
}

.btn-thr{
    border-radius:30px;
    padding:10px 30px;
    font-weight:600;
    background:#0f9b0f;
    border:none;
    transition:0.3s;
}

.btn-thr:hover{
    background:#0c7c0c;
    transform:scale(1.05);
}

.result{
    margin-top:30px;
    font-size:20px;
    font-weight:700;
    color:#0f9b0f;
    min-height:50px;
    transition:0.3s;
}

.fade-scale{
    animation:pop 0.3s ease;
}

@keyframes pop{
    0%{transform:scale(0.8); opacity:0;}
    100%{transform:scale(1); opacity:1;}
}

.card-transfer{
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(8px);
    border-radius:20px;
    padding:30px;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
    max-width:450px;
    width:100%;
    margin:auto;
    text-align:center;
    animation: fadeUp 0.6s ease;
}

.transfer-title{
    font-weight:700;
    margin-bottom:10px;
    color:#0f9b0f;
}

.transfer-desc{
    font-size:14px;
    color:#666;
    margin-bottom:20px;
}

.payment-box{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap:12px;
    margin-top:15px;
}

.payment-item-simple{
    background:linear-gradient(135deg,#0f9b0f,#38ef7d);
    color:white;
    padding:12px;
    border-radius:12px;
    font-weight:600;
    font-size:14px;
    box-shadow:0 8px 15px rgba(0,0,0,0.15);
    transition:0.3s;
}

.payment-item-simple:hover{
    transform:translateY(-3px);
    box-shadow:0 12px 20px rgba(0,0,0,0.2);
}

@keyframes fadeUp{
    0%{opacity:0; transform:translateY(20px);}
    100%{opacity:1; transform:translateY(0);}
}

</style>
</head>
<body>

<div class="main-wrapper">
    <div class="card-thr">
        <div class="title">Bagi-Bagi THR Lebaran</div>
        <div class="subtitle">Masukkan nama lengkapmu dan ambil THR sekarang!</div>

        <input type="text" id="nama" class="form-control text-center mb-3" placeholder="Masukkan Nama Lengkap">

        <button class="btn btn-thr btn-block" onclick="ambilTHR()">Ambil THR</button>

        <div class="result" id="hasil"></div>
    </div>

    <div class="card-transfer mt-2">
        <h5 class="transfer-title">🎁 Klaim THR Kamu</h5>
        <p class="transfer-desc">
            Screenshot hasil THR kamu lalu kirim ke WhatsApp admin untuk pencairan.
        </p>

        <a href="https://wa.me/" target="_blank" class="btn btn-success btn-block mb-3">
            💬 Kirim Screenshot ke WhatsApp
        </a>

        <div class="payment-box text-center">
            <div class="payment-item-simple">DANA</div>
            <div class="payment-item-simple">OVO</div>
            <div class="payment-item-simple">GoPay</div>
            <div class="payment-item-simple">Rekening Bank</div>
        </div>

        <small class="text-muted d-block mt-3">
            ⚠️ Pastikan nama sesuai dengan hasil yang muncul
        </small>
    </div>
</div>

<audio id="bgMusic" autoplay loop>
    <source src="musik/lagu.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn" style="
position:fixed;
bottom:20px;
right:20px;
padding:10px 15px;
border:none;
border-radius:20px;
background:#28a745;
color:white;
cursor:pointer;
z-index:9999;
">
▶️ Putar Musik
</button>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
function ambilTHR(){

    let nama = document.getElementById("nama").value.trim().toUpperCase();
    let hasil = document.getElementById("hasil");

    if(nama === ""){
        alert("Masukkan nama dulu ya 😄");
        return;
    }

    let huruf = nama.charAt(0);

    // Mapping opsi 1
    let thrFinal = 0;

    if(huruf >= 'A' && huruf <= 'E'){
        thrFinal = 50000;
    } else if(huruf >= 'F' && huruf <= 'J'){
        thrFinal = 40000;
    } else if(huruf >= 'K' && huruf <= 'O'){
        thrFinal = 30000;
    } else if(huruf >= 'P' && huruf <= 'T'){
        thrFinal = 20000;
    } else {
        thrFinal = 10000;
    }

    // Animasi acak uang
    let nominal = [50000,40000,30000,20000,10000];
    let i = 0;

    hasil.innerHTML = "Mengacak THR...";
    hasil.classList.add("fade-scale");

    let interval = setInterval(function(){
        let randomNominal = nominal[Math.floor(Math.random()*nominal.length)];
        hasil.innerHTML = "Rp " + randomNominal.toLocaleString("id-ID");
        hasil.classList.add("fade-scale");

        setTimeout(()=>hasil.classList.remove("fade-scale"),200);

        i++;
        if(i > 15){ // durasi animasi
            clearInterval(interval);

            setTimeout(function(){
                hasil.innerHTML = "SELAMAT KAMU DAPET THR 🎉 Rp " + thrFinal.toLocaleString("id-ID");
                hasil.classList.add("fade-scale");
                fireworkEffect(); // 🎆 Tambahan ini
            },300);
        }
    },100);
}

function fireworkEffect(){
    var duration = 3000;
    var animationEnd = Date.now() + duration;
    var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 9999 };

    function randomInRange(min, max) {
        return Math.random() * (max - min) + min;
    }

    var interval = setInterval(function() {
        var timeLeft = animationEnd - Date.now();

        if (timeLeft <= 0) {
            return clearInterval(interval);
        }

        var particleCount = 50 * (timeLeft / duration);

        confetti(Object.assign({}, defaults, { 
            particleCount,
            origin: { x: randomInRange(0.1, 0.9), y: Math.random() - 0.2 }
        }));
    }, 250);
}
</script>

<script>
const music = document.getElementById("bgMusic");
const btn = document.getElementById("musicBtn");

btn.addEventListener("click", function() {
    if (music.paused) {
        music.play();
        btn.innerHTML = "⏸️ Pause Musik";
    } else {
        music.pause();
        btn.innerHTML = "▶️ Putar Musik";
    }
});
</script>

</body>

</html>
